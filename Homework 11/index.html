<!doctype html>
<html>
  <head>
    <title>Canvas Game</title>
    <style>
      body {
        margin: 0;
        background: #eee;
      }

      canvas {
        display: block;
        margin: auto;
        background: white;
        border: 3px solid black;
      }
    </style>
  </head>

  <body>
    <canvas id="gameCanvas" width="800" height="600"></canvas>

    <script>
      let canvas = document.getElementById("gameCanvas");
      let ctx = canvas.getContext("2d");

      let player = { x: 50, y: 50, size: 25, speed: 4 };

      let obstacles = [
        { x: 200, y: 100, w: 60, h: 40, color: "red", dx: 2, dy: 1 },
        { x: 400, y: 300, w: 40, h: 80, color: "blue", dx: -1.5, dy: 2 },
      ];

      let clickObstacle = null;

      let exit = { x: 700, y: 500, w: 80, h: 80, color: "green" };

      let keys = {};

      window.addEventListener("keydown", (e) => (keys[e.key] = true));
      window.addEventListener("keyup", (e) => (keys[e.key] = false));

      canvas.addEventListener("mousedown", function (e) {
        if (clickObstacle == null) {
          let rect = canvas.getBoundingClientRect();

          clickObstacle = {
            x: e.clientX - rect.left,
            y: e.clientY - rect.top,
            w: 50,
            h: 50,
            color: "purple",
          };
        }
      });

      function movePlayer() {
        if (keys["w"] || keys["ArrowUp"]) {
          player.y -= player.speed;
        } else if (keys["s"] || keys["ArrowDown"]) {
          player.y += player.speed;
        }

        if (keys["a"] || keys["ArrowLeft"]) {
          player.x -= player.speed;
        } else if (keys["d"] || keys["ArrowRight"]) {
          player.x += player.speed;
        }
      }

      function moveObstacles() {
        for (let o of obstacles) {
          o.x += o.dx;
          o.y += o.dy;

          if (o.x > canvas.width) {
            o.x = 0;
          } else if (o.x + o.w < 0) {
            o.x = canvas.width;
          }

          if (o.y > canvas.height) {
            o.y = 0;
          } else if (o.y + o.h < 0) {
            o.y = canvas.height;
          }
        }
      }

      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = "black";
        ctx.fillRect(player.x, player.y, player.size, player.size);

        for (let o of obstacles) {
          ctx.fillStyle = o.color;
          ctx.fillRect(o.x, o.y, o.w, o.h);
        }

        if (clickObstacle != null) {
          ctx.fillStyle = clickObstacle.color;
          ctx.fillRect(
            clickObstacle.x,
            clickObstacle.y,
            clickObstacle.w,
            clickObstacle.h,
          );
        }

        ctx.fillStyle = exit.color;
        ctx.fillRect(exit.x, exit.y, exit.w, exit.h);
      }

      function checkWin() {
        if (
          player.x < exit.x + exit.w &&
          player.x + player.size > exit.x &&
          player.y < exit.y + exit.h &&
          player.y + player.size > exit.y
        ) {
          ctx.fillStyle = "black";
          ctx.font = "40px Arial";
          ctx.fillText("You Win!", 300, 250);
        }
      }

      function gameLoop() {
        movePlayer();

        moveObstacles();

        draw();

        checkWin();

        requestAnimationFrame(gameLoop);
      }

      gameLoop();
    </script>
  </body>
</html>
