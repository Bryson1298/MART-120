<html>
  <head>
    <title>First p5.js page</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.1.9/p5.min.js"></script>

    <script>
      let eyeOffsetX = 0;
      let pupilOffsetX = 0;
      let armOffsetY = 0;
      let hairOffsetY = 0;
      let diagX = 0;
      let diagY = 0;

      let eyeSpeed;
      let pupilSpeed;
      let armSpeed;
      let hairSpeed;
      let diagSpeedX;
      let diagSpeedY;

      let titleSize = 24;
      let grow = true;
      let count = 0;

      function setup() {
        createCanvas(500, 500);

        eyeSpeed = random(1, 3);
        pupilSpeed = random(1, 2.5);
        armSpeed = random(1, 3);
        hairSpeed = random(1, 2);
        diagSpeedX = random(1, 2);
        diagSpeedY = random(1, 2);
      }

      function draw() {
        background(220);

        // TITLE ANIMATION
        textSize(titleSize);
        fill(0);
        text("Self Portrait", 170, 40);

        if (grow) {
          titleSize += 0.4;
        } else {
          titleSize -= 0.4;
        }

        if (titleSize >= 34 || titleSize <= 24) {
          grow = !grow;
          count++;
        }

        if (count >= 10) {
          count = 0;
        }

        // HEAD
        fill(255, 220, 177);
        ellipse(250, 220, 150, 180);

        // EYES (move on x)
        fill(255);
        circle(220 + eyeOffsetX, 200, 30);
        circle(280 + eyeOffsetX, 200, 30);

        // PUPILS (move on x different speed)
        strokeWeight(6);
        point(220 + pupilOffsetX, 200);
        point(280 + pupilOffsetX, 200);

        // NOSE
        strokeWeight(1);
        fill(255, 200, 160);
        triangle(235, 240, 265, 240, 250, 210);

        // MOUTH (diagonal movement)
        strokeWeight(3);
        line(225 + diagX, 260 + diagY, 275 + diagX, 260 + diagY);

        // BODY
        fill(100, 150, 255);
        rect(210, 310, 80, 100);

        // ARMS (move on y)
        line(210, 330 + armOffsetY, 170, 380 + armOffsetY);
        line(290, 330 + armOffsetY, 330, 380 + armOffsetY);

        // HAIR (move on y different speed)
        fill(80, 50, 20);
        rect(200, 120 + hairOffsetY, 100, 30);
        rect(180, 120 + hairOffsetY, 20, 60);
        rect(300, 120 + hairOffsetY, 20, 60);

        // SIGNATURE
        textSize(16);
        fill(0);
        text("By: Bryson Corcoran", 170, 470);

        // X MOVEMENT
        eyeOffsetX += eyeSpeed;
        if (eyeOffsetX > 20 || eyeOffsetX < -20) {
          eyeSpeed *= -1;
        }

        pupilOffsetX += pupilSpeed;
        if (pupilOffsetX > 15 || pupilOffsetX < -15) {
          pupilSpeed *= -1;
        }

        // Y MOVEMENT
        armOffsetY += armSpeed;
        if (armOffsetY > 20 || armOffsetY < -20) {
          armSpeed *= -1;
        }

        hairOffsetY += hairSpeed;
        if (hairOffsetY > 15 || hairOffsetY < -15) {
          hairSpeed *= -1;
        }

        // DIAGONAL MOVEMENT
        diagX += diagSpeedX;
        diagY += diagSpeedY;

        if (diagX > 15 || diagX < -15) {
          diagSpeedX *= -1;
        }

        if (diagY > 15 || diagY < -15) {
          diagSpeedY *= -1;
        }
      }
    </script>
  </head>
</html>
