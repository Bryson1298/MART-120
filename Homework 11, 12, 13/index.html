<!doctype html>
<html>
  <head>
    <title>Canvas Game</title>
    <style>
      body {
        margin: 0;
        background: #eee;
      }

      canvas {
        display: block;
        margin: auto;
        background: white;
      }
    </style>
  </head>

  <body>
    <canvas id="gameCanvas" width="800" height="600"></canvas>

    <script>
      const canvas = document.getElementById("gameCanvas");
      const ctx = canvas.getContext("2d");

      let keys = {};
      let player;
      let obstacles = [];
      let clickedObstacles = [];
      let exit;
      let won = false;

      window.addEventListener("keydown", (e) => (keys[e.key] = true));
      window.addEventListener("keyup", (e) => (keys[e.key] = false));

      canvas.addEventListener("mousedown", function (e) {
        let rect = canvas.getBoundingClientRect();

        clickedObstacles.push({
          x: e.clientX - rect.left,
          y: e.clientY - rect.top,
          w: 40,
          h: 40,
          color: "purple",
        });
      });

      function createPlayer() {
        player = {
          x: 50,
          y: 50,
          size: 25,
          speed: 4,
        };
      }

      function movePlayer() {
        if (keys["w"] || keys["ArrowUp"]) player.y -= player.speed;
        if (keys["s"] || keys["ArrowDown"]) player.y += player.speed;
        if (keys["a"] || keys["ArrowLeft"]) player.x -= player.speed;
        if (keys["d"] || keys["ArrowRight"]) player.x += player.speed;
      }

      function createObstacles() {
        obstacles = [
          { x: 100, y: 100, w: 60, h: 40, color: "red", dx: 2, dy: 1 },
          { x: 250, y: 200, w: 80, h: 30, color: "blue", dx: -2, dy: 1.5 },
          { x: 400, y: 150, w: 50, h: 70, color: "green", dx: 1, dy: -2 },
          { x: 550, y: 300, w: 90, h: 35, color: "orange", dx: -1.5, dy: -1 },
          { x: 650, y: 100, w: 45, h: 90, color: "pink", dx: 2.5, dy: 2 },
        ];
      }

      function moveObstacles() {
        for (let o of obstacles) {
          o.x += o.dx;
          o.y += o.dy;

          if (o.x > canvas.width) o.x = -o.w;
          if (o.x + o.w < 0) o.x = canvas.width;
          if (o.y > canvas.height) o.y = -o.h;
          if (o.y + o.h < 0) o.y = canvas.height;
        }
      }

      function createExit() {
        exit = {
          x: 700,
          y: 500,
          w: 80,
          h: 80,
          color: "lime",
        };
      }

      function drawBackground() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
      }

      function drawBorders() {
        ctx.strokeStyle = "black";
        ctx.lineWidth = 5;
        ctx.strokeRect(0, 0, canvas.width, canvas.height);
      }

      function drawPlayer() {
        ctx.fillStyle = "black";
        ctx.fillRect(player.x, player.y, player.size, player.size);
      }

      function drawObstacles() {
        for (let o of obstacles) {
          ctx.fillStyle = o.color;
          ctx.fillRect(o.x, o.y, o.w, o.h);
        }
      }

      function drawClickedObstacles() {
        for (let o of clickedObstacles) {
          ctx.fillStyle = o.color;
          ctx.fillRect(o.x, o.y, o.w, o.h);
        }
      }

      function drawExit() {
        ctx.fillStyle = exit.color;
        ctx.fillRect(exit.x, exit.y, exit.w, exit.h);
      }

      function checkWin() {
        if (
          player.x < exit.x + exit.w &&
          player.x + player.size > exit.x &&
          player.y < exit.y + exit.h &&
          player.y + player.size > exit.y
        ) {
          won = true;
        }
      }

      function drawWinMessage() {
        ctx.fillStyle = "black";
        ctx.font = "40px Arial";
        ctx.fillText("You Win!", 280, 300);
      }

      function draw() {
        drawBackground();
        drawBorders();
        drawPlayer();
        drawObstacles();
        drawClickedObstacles();
        drawExit();

        if (won) {
          drawWinMessage();
        }
      }

      function gameLoop() {
        movePlayer();
        moveObstacles();
        checkWin();
        draw();
        requestAnimationFrame(gameLoop);
      }

      createPlayer();
      createObstacles();
      createExit();
      gameLoop();
    </script>
  </body>
</html>
