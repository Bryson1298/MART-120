<html>
  <head>
    <title>First p5.js page</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.1.9/p5.min.js"></script>
    <script>
      function setup() {
        createCanvas(500, 500);
        background(220);

        // Title
        textSize(24);
        fill(0);
        text("Self Portrait", 170, 40);

        // Head (ellipse)
        fill(255, 220, 177);
        ellipse(250, 220, 150, 180);

        // Eyes (circles)
        fill(255);
        circle(220, 200, 30);
        circle(280, 200, 30);

        // Pupils (points)
        strokeWeight(6);
        point(220, 200);
        point(280, 200);

        // Nose (triangle - first point bottom left)
        strokeWeight(1);
        fill(255, 200, 160);
        triangle(235, 240, 265, 240, 250, 210);

        // Mouth (line)
        strokeWeight(3);
        line(225, 260, 275, 260);

        // Body (rectangle)
        fill(100, 150, 255);
        rect(210, 310, 80, 100);

        // Arms (lines)
        line(210, 330, 170, 380);
        line(290, 330, 330, 380);

        // Hair (rectangles)
        fill(80, 50, 20);
        rect(200, 120, 100, 30);
        rect(180, 120, 20, 60);
        rect(300, 120, 20, 60);

        // Signature
        textSize(16);
        fill(0);
        text("By: Bryson Corcoran", 170, 470);
      }
    </script>
  </head>
</html>
