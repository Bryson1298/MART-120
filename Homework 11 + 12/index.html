<!doctype html>
<html>
  <head>
    <title>Canvas Game</title>
    <style>
      body {
        margin: 0;
        background: #eee;
      }

      canvas {
        display: block;
        margin: auto;
        background: white;
      }
    </style>
  </head>

  <body>
    <canvas id="gameCanvas" width="800" height="600"></canvas>

    <script>
      const canvas = document.getElementById("gameCanvas");
      const ctx = canvas.getContext("2d");

      let keys = {};
      let player;
      let obstacles = [];
      let clickObstacle = null;
      let exit;

      window.addEventListener("keydown", (e) => (keys[e.key] = true));
      window.addEventListener("keyup", (e) => (keys[e.key] = false));

      canvas.addEventListener("mousedown", function (e) {
        let rect = canvas.getBoundingClientRect();

        clickObstacle = {
          x: e.clientX - rect.left,
          y: e.clientY - rect.top,
          w: 50,
          h: 50,
          color: "purple",
        };
      });

      function createPlayer() {
        player = { x: 50, y: 50, size: 25, speed: 4 };
      }

      function movePlayer() {
        if (keys["w"] || keys["ArrowUp"]) player.y -= player.speed;
        if (keys["s"] || keys["ArrowDown"]) player.y += player.speed;
        if (keys["a"] || keys["ArrowLeft"]) player.x -= player.speed;
        if (keys["d"] || keys["ArrowRight"]) player.x += player.speed;
      }

      function createObstacles() {
        obstacles = [
          { x: 200, y: 100, w: 60, h: 40, color: "red", dx: 2, dy: 1 },
          { x: 400, y: 300, w: 40, h: 80, color: "blue", dx: -1.5, dy: 2 },
          { x: 600, y: 200, w: 70, h: 30, color: "orange", dx: 1, dy: -2 },
        ];
      }

      function moveObstacle1() {
        let o = obstacles[0];
        o.x += o.dx;
        o.y += o.dy;

        if (o.x > canvas.width) o.x = 0;
        if (o.x + o.w < 0) o.x = canvas.width;
        if (o.y > canvas.height) o.y = 0;
        if (o.y + o.h < 0) o.y = canvas.height;
      }

      function moveObstacle2() {
        let o = obstacles[1];
        o.x += o.dx;
        o.y += o.dy;

        if (o.x > canvas.width) o.x = 0;
        if (o.x + o.w < 0) o.x = canvas.width;
        if (o.y > canvas.height) o.y = 0;
        if (o.y + o.h < 0) o.y = canvas.height;
      }

      function moveObstacle3() {
        let o = obstacles[2];
        o.x += o.dx;
        o.y += o.dy;

        if (o.x > canvas.width) o.x = 0;
        if (o.x + o.w < 0) o.x = canvas.width;
        if (o.y > canvas.height) o.y = 0;
        if (o.y + o.h < 0) o.y = canvas.height;
      }

      function moveObstacles() {
        moveObstacle1();
        moveObstacle2();
        moveObstacle3();
      }

      function createExit() {
        exit = { x: 700, y: 500, w: 80, h: 80, color: "green" };
      }

      function drawBorders() {
        ctx.strokeStyle = "black";
        ctx.lineWidth = 5;
        ctx.strokeRect(0, 0, canvas.width, canvas.height);
      }

      function drawWinMessage() {
        ctx.fillStyle = "black";
        ctx.font = "40px Arial";
        ctx.fillText("You Win!", 300, 250);
      }

      function drawBackground() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
      }

      function drawPlayer() {
        ctx.fillStyle = "black";
        ctx.fillRect(player.x, player.y, player.size, player.size);
      }

      function drawObstacles() {
        for (let o of obstacles) {
          ctx.fillStyle = o.color;
          ctx.fillRect(o.x, o.y, o.w, o.h);
        }
      }

      function drawClickObstacle() {
        if (clickObstacle) {
          ctx.fillStyle = clickObstacle.color;
          ctx.fillRect(
            clickObstacle.x,
            clickObstacle.y,
            clickObstacle.w,
            clickObstacle.h,
          );
        }
      }

      function drawExit() {
        ctx.fillStyle = exit.color;
        ctx.fillRect(exit.x, exit.y, exit.w, exit.h);
      }

      function checkWin() {
        if (
          player.x < exit.x + exit.w &&
          player.x + player.size > exit.x &&
          player.y < exit.y + exit.h &&
          player.y + player.size > exit.y
        ) {
          drawWinMessage();
        }
      }

      function draw() {
        drawBackground();
        drawBorders();
        drawPlayer();
        drawObstacles();
        drawClickObstacle();
        drawExit();
      }

      function gameLoop() {
        movePlayer();
        moveObstacles();
        draw();
        checkWin();
        requestAnimationFrame(gameLoop);
      }

      createPlayer();
      createObstacles();
      createExit();
      gameLoop();
    </script>
  </body>
</html>
